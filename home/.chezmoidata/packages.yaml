packages:
  # Debian/Ubuntu apt packages (Linux without Homebrew)
  apt:
    - ripgrep
    - direnv

  # Homebrew packages (macOS, or Linux with brew)
  brew:
    - ripgrep
    - direnv
    - node        # Node.js LTS — needed for npm packages below
    - worktrunk   # git worktree manager (installs as 'wt')
    - vscli       # VS Code devcontainer launcher
    - chruby      # lightweight Ruby version switcher (shell function)
    - ruby-install  # installs Ruby versions for use with chruby

  # npm global packages — all coding-agent CLIs
  # Requires Node.js 22+ (auggie is the strictest)
  npm:
    - "@devcontainers/cli"         # devcontainer (dc alias)
    - "@anthropic-ai/claude-code"  # claude
    - "@openai/codex"              # codex
    - "@google/gemini-cli"         # gemini
    - "@augmentcode/auggie"        # auggie (Augment Code CLI)

  # Windows Package Manager (winget) packages
  # worktrunk installs as 'git-wt' on Windows (avoids conflict with Windows Terminal's 'wt')
  # Cursor CLI (command: 'agent') is installed separately via PowerShell script
  # npm tools (codex, gemini, auggie) are installed after Node.js via npm
  winget:
    - id: BurntSushi.ripgrep.MSVC  # ripgrep (rg)
    - id: direnv.direnv             # direnv
    - id: max-sixty.worktrunk       # git worktree manager (installs as 'git-wt' on Windows)
    - id: michidk.vscli             # VS Code devcontainer launcher
    - id: Anthropic.ClaudeCode      # claude (native binary, not npm)
    - id: OpenJS.NodeJS.LTS         # Node.js LTS — needed for npm packages below
