packages:
  # Debian/Ubuntu apt packages (Linux without Homebrew)
  apt:
    - ripgrep
    - direnv
    - jq          # JSON processor — required by purse-outfit-agents
    - unzip       # needed to unpack the gk (GitKraken CLI) release zip
    - fzf         # fuzzy finder — used by zoxide's zi and standalone
  # gk (GitKraken CLI) isn't packaged for apt/brew-on-Linux (brew ships it as a
  # macOS-only cask), so on Unix it's installed from GitHub releases by
  # run_onchange_install-packages.sh. Windows uses winget (below).

  # Homebrew packages — Linux, only those NOT covered by apt/NodeSource/GitHub-releases.
  # apt covers: ripgrep, direnv, jq, fzf
  # NodeSource covers: node; npm covers: devcontainer; GitHub releases cover: vscli, zoxide, uv
  # source builds cover: chruby, ruby-install
  # git is handled separately by purse-install-extras: PPA on Ubuntu, built from
  # source on other apt+root systems (e.g. Debian), brew when there's no root.
  brew_linux_only:
    - yq          # YAML processor (mikefarah) — not in apt or any other Linux installer
    - worktrunk   # git worktree manager — not in apt or any other Linux installer

  # Homebrew packages (macOS, or Linux without root)
  brew:
    - git
    - ripgrep
    - direnv
    - jq          # JSON processor — required by purse-outfit-agents
    - yq          # YAML processor (mikefarah) — general-purpose convenience
    - node        # Node.js LTS — needed for npm packages below
    - devcontainer # devcontainer CLI (@devcontainers/cli)
    - vscli       # VS Code devcontainer launcher
    - chruby      # lightweight Ruby version switcher (shell function)
    - ruby-install  # installs Ruby versions for use with chruby
    - uv          # fast Python package manager and tool runner
    - worktrunk   # git worktree manager
    - zoxide      # frecency-based directory jumper
    - fzf         # fuzzy finder — used by zoxide's zi and standalone

  # npm global packages — core tools (always installed via run_onchange)
  npm:
    - "@devcontainers/cli"         # devcontainer (dc alias)

  # npm global packages — coding-agent CLIs (installed via purse-install-agents)
  # Requires Node.js 22+ (auggie is the strictest)
  agents_npm:
    - "@anthropic-ai/claude-code"  # claude
    - "@openai/codex"              # codex
    - "devin-cli"                  # devin
    - "@augmentcode/auggie"        # auggie
    - "opencode-ai"                # opencode

  # Windows Package Manager (winget) packages
  # (Agents like claude, codex, etc. are installed via purse-install-agents)
  winget:
    - id: BurntSushi.ripgrep.MSVC  # ripgrep (rg)
    - id: direnv.direnv             # direnv
    - id: jqlang.jq                 # JSON processor (required by MCP installer)
    - id: MikeFarah.yq              # YAML processor — general-purpose convenience
    - id: michidk.vscli             # VS Code devcontainer launcher
    - id: Anthropic.ClaudeCode      # claude (native binary, not npm)
    - id: OpenJS.NodeJS.LTS         # Node.js LTS — needed for npm packages below
    - id: astral-sh.uv              # fast Python package manager and tool runner
    - id: max-sixty.worktrunk       # git worktree manager
    - id: ajeetdsouza.zoxide        # frecency-based directory jumper
    - id: junegunn.fzf              # fuzzy finder — used by zoxide's zi and standalone
    - id: gitkraken.cli             # gk (GitKraken CLI) — its MCP server is wired up by purse-outfit-agents
