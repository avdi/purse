# Declarative MCP server shortlist, registered into every present agent by
# purse-outfit-agents. Token VALUES are never stored here — only
# env-var reference strings, expanded by each agent at runtime from the shell env.
mcpServers:
  github:
    description: "GitHub MCP (issues, PRs, repos, code search)"
    transport: http
    url: "https://api.githubcopilot.com/mcp/"
    headers:
      Authorization: "Bearer ${GITHUB_PERSONAL_ACCESS_TOKEN}"
    requiresEnv:
      - GITHUB_PERSONAL_ACCESS_TOKEN
  playwright:
    description: "Playwright browser automation MCP"
    transport: stdio
    command: npx
    args: ["-y", "@playwright/mcp@latest"]
    requiresEnv: []
  auggie:
    description: "Augment CLI agent as MCP tool server"
    transport: stdio
    command: auggie
    args: ["--mcp", "--mcp-auto-workspace"]
    requiresEnv: []
  ripgrep:
    description: "ripgrep code search via MCP"
    transport: stdio
    command: npx
    args: ["-y", "mcp-ripgrep@latest"]
    requiresEnv: []
  codebase-memory-mcp:
    description: "Codebase knowledge graph MCP"
    transport: stdio
    command: codebase-memory-mcp
    args: []
    requiresEnv: []

# Agents the installer will attempt to configure (only those whose CLI/config is
# detected on the machine are actually touched).
mcpAgents:
  - claude
  - codex
  - antigravity
  - auggie
  - copilot
  - cursor
  - vscode
  - opencode
  - devin
