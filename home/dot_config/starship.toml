"$schema" = 'https://starship.rs/config-schema.json'

# Cross-shell prompt (bash, zsh, PowerShell) — managed by chezmoi.
# Installed to ~/.config/starship.toml; init hooks live in
# ~/.config/shell/aliases.sh (Unix) and $PROFILE (Windows).
#
# Requires a Nerd Font. Set your terminal font to "Cascadia Code NF"
# (installed from microsoft/cascadia-code releases by run_onchange_install-fonts).
#
# Layout is deliberately two-line: context on the top line, the command
# entry point alone on the bottom line, with a blank line separating prompts.

add_newline = true

format = """
$container\
$directory\
$git_branch\
$git_status\
$git_state\
$ruby\
$env_var\
$direnv\
$cmd_duration\
$line_break\
$character"""

[directory]
style = 'bold cyan'
truncation_length = 4
truncate_to_repo = true
read_only = '  '

[git_branch]
symbol = ' '
format = 'on [$symbol$branch]($style) '
style = 'bold purple'

[git_status]
style = 'bold yellow'
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = '~'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
untracked = '?${count}'
stashed = '*${count}'
modified = '!${count}'
staged = '+${count}'
renamed = '»${count}'
deleted = '✘${count}'

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = 'bold red'

[cmd_duration]
min_time = 2000
format = 'took [$duration]($style) '
style = 'italic dimmed white'

# container — shows devcontainer name when inside one (reads DEVCONTAINER label)
[container]
format = '[$symbol \[$name\]]($style) '
style = 'bold blue dimmed'

# ruby — only visible when chruby has switched to a non-system Ruby
[ruby]
symbol = ' '
format = '[$symbol$version]($style) '
style = 'bold red'

# env_var — show a marker when DEVCONTAINER_CONFIG is set, meaning the project
# has a non-default devcontainer profile selected (dc up will use it)
[env_var.DEVCONTAINER_CONFIG]
symbol = '⬡'
format = '[$symbol]($style) '
style = 'bold cyan'

# direnv — shows whether the current .envrc is loaded (green) or blocked (red).
# Critical context: DEVCONTAINER_CONFIG comes from direnv, so if it's not loaded
# dc up will ignore the project's profile selection.
[direnv]
disabled = false
format = '[$symbol$loaded/$allowed]($style) '
style = 'bold orange'
loaded_msg = '✔'
unloaded_msg = '✘'
allowed_msg = 'ok'
denied_msg = '!'
not_allowed_msg = '?'

[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
